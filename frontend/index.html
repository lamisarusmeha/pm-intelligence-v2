<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ð¡ PM Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* âââââââââââââââââââââââââââââââââââââââââââââââ
   DESIGN SYSTEM â ADHD-Friendly Dark + Pink
âââââââââââââââââââââââââââââââââââââââââââââââ */
:root {
  --bg:         #0d0d12;
  --surface:    #13131a;
  --surface2:   #1a1a24;
  --border:     #252535;
  --border2:    #303045;
  --text:       #eeeef5;
  --dim:        #6b6b8a;

  --pink:       #ff4da6;
  --pink-dim:   rgba(255,77,166,0.15);
  --pink-glow:  rgba(255,77,166,0.35);
  --pink2:      #ff80c0;

  --green:      #3dd68c;
  --green-dim:  rgba(61,214,140,0.14);

  --red:        #ff5066;
  --red-dim:    rgba(255,80,102,0.14);

  --blue:       #6699ff;
  --blue-dim:   rgba(102,153,255,0.14);

  --gold:       #ffcc44;
  --gold-dim:   rgba(255,204,68,0.14);

  --radius:     10px;
  --font-body:  'Inter', system-ui, sans-serif;

  /* aliases so old CSS vars still work */
  --blood:      var(--red);
  --blood-dim:  var(--red-dim);
  --blood-glow: rgba(255,80,102,0.3);
  --crimson:    var(--red);
  --hot-pink:   var(--pink2);
  --pink-dim:   rgba(255,77,166,0.15);
  --white:      #ffffff;
  --font-gothic: 'Inter', sans-serif;
  --font-text:   'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle background glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 35% at 50% 0%, rgba(255,77,166,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 30% 30% at 100% 100%, rgba(102,153,255,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after { content: none; }

/* ââ Scrollbar ââââââââââââââââââââââââââââââââ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--blood); }

/* ââ Keyframes âââââââââââââââââââââââââââââââ */
@keyframes pulse-blood {
  0%,100% { box-shadow: 0 0 14px var(--pink-glow), inset 0 0 10px rgba(255,77,166,0.05); }
  50%      { box-shadow: 0 0 28px var(--pink-glow), 0 0 50px rgba(255,77,166,0.12), inset 0 0 18px rgba(255,77,166,0.07); }
}

@keyframes pulse-pink {
  0%,100% { box-shadow: 0 0 12px var(--pink-glow); }
  50%      { box-shadow: 0 0 25px var(--pink-glow), 0 0 50px rgba(255,77,166,0.18); }
}

@keyframes blink-red {
  0%,100% { opacity:1; }
  50%      { opacity:0.35; }
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

@keyframes cardEnter {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

@keyframes slideIn {
  from { transform: translateX(110%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

@keyframes slideOut {
  from { transform: translateX(0);    opacity: 1; }
  to   { transform: translateX(110%); opacity: 0; }
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes drip {
  0%   { transform: scaleY(0) translateY(-50%); opacity: 0; }
  30%  { opacity: 1; }
  100% { transform: scaleY(1) translateY(0); opacity: 0.6; }
}

/* ââ HEADER âââââââââââââââââââââââââââââââââââ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border2);
  background: rgba(7,3,3,0.97);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--pink), var(--blue), var(--pink), transparent);
  opacity: 0.5;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 0.5px;
}

.logo-mark {
  width: 30px;
  height: 30px;
  border: 2px solid var(--pink);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  color: var(--pink);
  box-shadow: 0 0 10px var(--pink-glow);
  animation: pulse-blood 3s ease-in-out infinite;
  position: relative;
  flex-shrink: 0;
}

.logo-dot {
  width: 8px; height: 8px;
  background: var(--pink);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--pink);
  animation: blink-red 2s ease-in-out infinite;
}

.logo span.accent { color: var(--pink); }

/* Header stats â WIN RATE + PNL front and center */
.header-stats {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hstat {
  text-align: center;
  padding: 6px 16px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--surface);
  min-width: 90px;
}

.hstat.primary {
  border-color: var(--pink);
  background: rgba(255,77,166,0.07);
  box-shadow: 0 0 12px rgba(255,77,166,0.12);
}

.hstat-val {
  font-family: var(--font-body);
  font-size: 20px;
  font-weight: 800;
  color: var(--pink);
  letter-spacing: 0px;
  line-height: 1.1;
}

.hstat-val.pink    { color: var(--pink); }
.hstat-val.dim     { color: var(--text); }
.hstat-val.loss    { color: var(--red); }
.hstat-val.neutral { color: var(--gold); }

.hstat-label {
  font-size: 9px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 3px;
  font-family: var(--font-body);
  font-weight: 500;
}

.hstat-sep {
  width: 1px;
  height: 30px;
  background: var(--border2);
  flex-shrink: 0;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-family: var(--font-body);
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--dim);
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 6px 14px;
  border-radius: 20px;
}

.status-dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: blink-red 1.8s infinite;
  box-shadow: 0 0 6px var(--green);
}

/* ââ MAIN LAYOUT âââââââââââââââââââââââââââââââ */
.layout {
  display: grid;
  grid-template-columns: 1fr 370px;
  gap: 0;
  min-height: calc(100vh - 61px);
  position: relative;
  z-index: 1;
}

/* ââ LEFT: Signal feed ââââââââââââââââââââââââââ */
.signal-panel {
  padding: 20px 20px;
  border-right: 1px solid var(--border2);
  overflow-y: auto;
  max-height: calc(100vh - 61px);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.signal-count-badge {
  background: var(--pink-dim);
  color: var(--pink);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-body);
  padding: 3px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,77,166,0.3);
  letter-spacing: 0.5px;
}

/* ââ SIGNAL CARD âââââââââââââââââââââââââââââââ */
.signal-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.signal-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  border-radius: var(--radius) 0 0 var(--radius);
}

.signal-card:hover { transform: translateX(3px); }

.signal-card.strong {
  border-color: rgba(255,77,166,0.45);
  animation: pulse-blood 3s ease-in-out infinite;
}
.signal-card.strong::before { background: var(--pink); }

.signal-card.medium {
  border-color: rgba(255,204,68,0.4);
}
.signal-card.medium::before { background: var(--gold); }

.signal-card.weak {
  border-color: rgba(255,80,102,0.3);
}
.signal-card.weak::before { background: var(--red); }

.card-new-badge {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 9px;
  font-weight: 700;
  font-family: var(--font-body);
  color: var(--pink);
  background: var(--pink-dim);
  border: 1px solid rgba(255,77,166,0.4);
  padding: 2px 9px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
  animation: fadeIn 0.4s ease;
}

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.signal-emoji {
  font-size: 20px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
}

.card-info { flex: 1; min-width: 0; }

.card-question {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.45;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 9px;
  color: var(--dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 2px;
  border: 1px solid var(--border);
  font-family: var(--font-gothic);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.meta-tag.dir-yes {
  color: var(--green);
  border-color: rgba(61,214,140,0.3);
  background: var(--green-dim);
}

.meta-tag.dir-no {
  color: var(--red);
  border-color: rgba(255,80,102,0.3);
  background: var(--red-dim);
}

/* Confidence bar */
.confidence-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.confidence-label {
  font-size: 9px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  width: 65px;
  flex-shrink: 0;
  font-family: var(--font-gothic);
}

.confidence-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.confidence-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.confidence-bar-fill.strong { background: linear-gradient(90deg, #cc2288, var(--pink), var(--pink2)); }
.confidence-bar-fill.medium { background: linear-gradient(90deg, #ccaa00, var(--gold)); }
.confidence-bar-fill.weak   { background: linear-gradient(90deg, #cc2233, var(--red)); }

.confidence-pct {
  font-size: 12px;
  font-weight: 700;
  width: 34px;
  text-align: right;
  font-family: var(--font-body);
}
.confidence-pct.strong { color: var(--pink); }
.confidence-pct.medium { color: var(--gold); }
.confidence-pct.weak   { color: var(--red); }

/* Factor chips */
.factors-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.factor-chip {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--dim);
  letter-spacing: 0.3px;
}

.factor-chip.hot {
  background: rgba(204,0,34,0.1);
  border-color: rgba(204,0,34,0.3);
  color: var(--blood);
}

/* Price row */
.price-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.price-display {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.5px;
}
.price-display span {
  color: var(--text);
  font-weight: 600;
}

.volume-spike {
  font-size: 9px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ââ RIGHT PANEL âââââââââââââââââââââââââââââââ */
.right-panel {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  max-height: calc(100vh - 61px);
  background: var(--surface);
}

.right-section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}

/* ââ HERO STATS (Win Rate + PNL) âââââââââââââââ */
.hero-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.hero-stat {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 12px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero-stat::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 0 0 var(--radius) var(--radius);
}

.hero-stat.winrate::before { background: linear-gradient(90deg, var(--pink), var(--pink2)); }
.hero-stat.pnl::before { background: linear-gradient(90deg, var(--green), #66ffb8); }

.hero-stat-val {
  font-family: var(--font-body);
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat.winrate .hero-stat-val { color: var(--pink); text-shadow: 0 0 18px var(--pink-glow); }
.hero-stat.pnl .hero-stat-val { color: var(--green); text-shadow: 0 0 14px rgba(61,214,140,0.4); }
.hero-stat.pnl .hero-stat-val.neg { color: var(--red); text-shadow: 0 0 14px rgba(255,80,102,0.3); }

.hero-stat-sub {
  font-size: 10px;
  color: var(--dim);
  font-family: var(--font-body);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

/* Secondary portfolio stats (2x2 grid below hero) */
.portfolio-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.pf-stat {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
}

.pf-stat-val {
  font-family: var(--font-gothic);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.pf-stat-val.neg     { color: var(--blood); }
.pf-stat-val.neutral { color: var(--gold); }

.pf-stat-label {
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-family: var(--font-gothic);
}

/* Mini chart */
.chart-container {
  position: relative;
  height: 120px;
  margin-top: 12px;
}

/* ââ TABS âââââââââââââââââââââââââââââââââââââââ */
.tabs {
  display: flex;
  width: 100%;
  background: var(--surface);
  border-bottom: 2px solid var(--border2);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 16px 8px;
  border-radius: 0;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  color: var(--dim);
  background: transparent;
  transition: color 0.18s, border-color 0.18s, background 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  text-align: center;
  line-height: 1.3;
}

.tab:hover:not(.active) {
  color: var(--text);
  background: rgba(255,255,255,0.04);
}

.tab:nth-child(1).active { border-bottom-color: var(--pink);  color: var(--pink);  background: var(--pink-dim); }
.tab:nth-child(2).active { border-bottom-color: var(--green); color: var(--green); background: var(--green-dim); }
.tab:nth-child(3).active { border-bottom-color: var(--gold);  color: var(--gold);  background: var(--gold-dim); }
.tab:nth-child(4).active { border-bottom-color: var(--blue);  color: var(--blue);  background: var(--blue-dim); }
.tab:nth-child(5).active { border-bottom-color: var(--green); color: var(--green); background: var(--green-dim); }
.tab:nth-child(6).active { border-bottom-color: #e879f9; color: #e879f9; background: rgba(232,121,249,0.08); }

/* ââ MARKET LIST âââââââââââââââââââââââââââââââ */
.market-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 6px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  border-radius: 4px;
}

.market-row:hover { background: var(--surface2); }
.market-row:last-child { border-bottom: none; }

.market-price-badge {
  width: 40px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-gothic);
  flex-shrink: 0;
}

.market-q {
  font-size: 11px;
  color: var(--text);
  flex: 1;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.market-vol {
  font-size: 9px;
  color: var(--dim);
  text-align: right;
  flex-shrink: 0;
  font-family: var(--font-gothic);
  letter-spacing: 0.5px;
}

/* ââ TRADE CARDS âââââââââââââââââââââââââââââââ */
.trade-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 13px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
}
.trade-card:last-child { margin-bottom: 0; }
.trade-card:hover { border-color: var(--border2); }

.trade-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.trade-dir {
  font-size: 9px;
  font-weight: 700;
  font-family: var(--font-gothic);
  padding: 3px 8px;
  border-radius: 2px;
  flex-shrink: 0;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.trade-dir.yes {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(61,214,140,0.3);
}
.trade-dir.no {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(255,80,102,0.3);
}

.trade-status {
  font-size: 9px;
  font-family: var(--font-gothic);
  padding: 3px 8px;
  border-radius: 2px;
  flex-shrink: 0;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.trade-status.open   { background: rgba(100,100,180,0.15); color: #8899ff; border: 1px solid rgba(100,100,255,0.2); }
.trade-status.win    { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.25); }
.trade-status.loss   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,80,102,0.25); }
.trade-status.other  { background: var(--surface);   color: var(--dim);   border: 1px solid var(--border); }

.trade-q {
  flex: 1;
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.trade-meta {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.trade-meta-cell  { text-align: center; }
.trade-meta-lbl {
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
  font-family: var(--font-gothic);
}
.trade-meta-val {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--font-gothic);
}
.trade-meta-val.pos { color: var(--green); }
.trade-meta-val.neg { color: var(--red); }
.trade-meta-val.dim { color: var(--dim); }

/* Position summary bar */
.position-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 12px;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
}
.pos-sum-cell  { text-align: center; }
.pos-sum-lbl   { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; font-family: var(--font-gothic); }
.pos-sum-val   { font-size: 14px; font-weight: 700; color: var(--text); font-family: var(--font-gothic); }

.trade-row { display: none; }
